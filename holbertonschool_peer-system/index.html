<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holberton BEU-CS · Peer Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b12;
  --surface:  #0f1320;
  --card:     #131825;
  --border:   #1e2535;
  --accent:   #00e5c3;
  --gold:     #ffd166;
  --silver:   #b0bec5;
  --bronze:   #cd8b5a;
  --danger:   #ff6b6b;
  --purple:   #a78bfa;
  --text:     #e8eaf2;
  --muted:    #5a6478;
  --radius:   10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* animated grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,195,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,195,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}

/* glow blobs */
body::after {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 400px;
  background: radial-gradient(ellipse, rgba(0,229,195,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 40px 20px 80px; }

/* ── HEADER ── */
header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.6s ease both; }

.logo-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0,229,195,0.08);
  border: 1px solid rgba(0,229,195,0.2);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 20px;
}

.logo-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
}
h1 em { font-style: normal; color: var(--accent); }

.tagline { margin-top: 12px; color: var(--muted); font-size: 12px; letter-spacing: 1px; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 36px;
  animation: fadeUp 0.6s ease 0.1s both;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  text-align: center;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

/* ── PODIUM ── */
.podium-section {
  margin-bottom: 36px;
  animation: fadeUp 0.6s ease 0.2s both;
}

.section-label {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.podium {
  display: grid;
  grid-template-columns: 1fr 1.1fr 1fr;
  gap: 12px;
  align-items: end;
}

.podium-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
}
.podium-card:hover { transform: translateY(-4px); }
.podium-card.gold   { border-color: var(--gold);   }
.podium-card.silver { border-color: var(--silver); }
.podium-card.bronze { border-color: var(--bronze); }

.podium-medal { font-size: 28px; margin-bottom: 8px; }
.podium-rank  { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
.podium-name  { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
.podium-score {
  margin-top: 8px;
  font-size: 22px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
}
.gold   .podium-score { color: var(--gold); }
.silver .podium-score { color: var(--silver); }
.bronze .podium-score { color: var(--bronze); }

/* ── TABLE ── */
.table-section { animation: fadeUp 0.6s ease 0.3s both; }

.table-wrapper {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

thead tr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
th {
  padding: 12px 16px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); text-align: left; font-weight: 700;
}

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,229,195,0.04); }

td { padding: 13px 16px; font-size: 13px; }

.rank-cell { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--muted); width: 48px; }
.rank-cell.top1 { color: var(--gold); }
.rank-cell.top2 { color: var(--silver); }
.rank-cell.top3 { color: var(--bronze); }

.name-cell { font-weight: 700; }
.name-cell span { display: block; font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 2px; }

.score-cell {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 16px;
}

.score-bar-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar {
  flex: 1; height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden; max-width: 80px;
}
.score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s ease; }

.badge-count {
  background: rgba(0,229,195,0.1);
  color: var(--accent);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  border: 1px solid rgba(0,229,195,0.2);
}

/* ── MODAL ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%; max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  animation: popIn 0.25s ease both;
}

.modal-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
}

.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
.modal-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.close-btn {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; line-height: 1;
  padding: 4px; transition: color 0.15s;
}
.close-btn:hover { color: var(--text); }

.modal-body { padding: 20px 24px 24px; }

.modal-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.modal-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.modal-stat-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }
.modal-stat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

.project-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px;
}
.project-row:last-child { border-bottom: none; }
.project-name { color: var(--text); }
.project-score-val { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }

.modal-section-title {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px; margin-top: 20px;
}

/* loader */
.loader {
  text-align: center; padding: 60px;
  color: var(--muted); font-size: 12px; letter-spacing: 2px;
}
.loader::after { content: ''; animation: dots 1.2s infinite; }

@keyframes dots {
  0%   { content: '.'; }
  33%  { content: '..'; }
  66%  { content: '...'; }
}

/* animations */
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
@keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
@keyframes popIn    { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:none; } }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .podium { grid-template-columns: 1fr; }
  th:nth-child(4), td:nth-child(4) { display: none; }
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo-badge"><div class="logo-dot"></div> BEU-CS Cohort</div>
    <h1>Peer <em>Leaderboard</em></h1>
    <p class="tagline">Holberton School · Real-time peer review rankings</p>
  </header>

  <div class="stats-row" id="statsRow">
    <div class="loader" style="grid-column:1/-1">Yüklənir</div>
  </div>

  <div class="podium-section">
    <div class="section-label">🏆 Top 3</div>
    <div class="podium" id="podium">
      <div class="loader" style="grid-column:1/-1">Yüklənir</div>
    </div>
  </div>

  <div class="table-section">
    <div class="section-label">📋 Tam sıralama</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Ad Soyad</th>
            <th>Ortalama bal</th>
            <th>Review sayı</th>
            <th>Proyektlər</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="5" class="loader">Yüklənir</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalName">—</div>
        <div class="modal-sub" id="modalSub">—</div>
      </div>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loader">Yüklənir</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

// ── Fetch helpers ──────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

// ── Score color ────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 85) return '#00e5c3';
  if (s >= 70) return '#ffd166';
  return '#ff6b6b';
}

// ── Load stats ─────────────────────────────────────────────
async function loadStats() {
  const s = await fetchJSON(`${API}/stats`);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${s.total_students}</div>
      <div class="stat-lbl">Tələbə</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${s.total_projects}</div>
      <div class="stat-lbl">Proyekt</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${s.total_reviews}</div>
      <div class="stat-lbl">Review</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--gold)">${s.overall_avg}</div>
      <div class="stat-lbl">Ümumi ortalama</div>
    </div>
  `;
}

// ── Load leaderboard ───────────────────────────────────────
async function loadLeaderboard() {
  const data = await fetchJSON(`${API}/leaderboard`);

  // Podium — top 3
  const medals = [
    { cls: 'gold',   emoji: '🥇', rank: '1-ci yer'  },
    { cls: 'silver', emoji: '🥈', rank: '2-ci yer'  },
    { cls: 'bronze', emoji: '🥉', rank: '3-cü yer'  },
  ];
  const podiumOrder = [data[1], data[0], data[2]]; // 2nd | 1st | 3rd
  const podiumClasses = ['silver', 'gold', 'bronze'];
  const podiumEmojis  = ['🥈', '🥇', '🥉'];
  const podiumRanks   = ['2-ci yer', '1-ci yer', '3-cü yer'];

  document.getElementById('podium').innerHTML = podiumOrder.map((p, i) => `
    <div class="podium-card ${podiumClasses[i]}" onclick="openStudent(${p.id})">
      <div class="podium-medal">${podiumEmojis[i]}</div>
      <div class="podium-rank">${podiumRanks[i]}</div>
      <div class="podium-name">${p.first_name} ${p.last_name}</div>
      <div class="podium-score">${p.avg_score}</div>
    </div>
  `).join('');

  // Table
  const tbody = document.getElementById('leaderboardBody');
  tbody.innerHTML = data.map(p => {
    let rankClass = '';
    if (p.rank === 1) rankClass = 'top1';
    else if (p.rank === 2) rankClass = 'top2';
    else if (p.rank === 3) rankClass = 'top3';

    const pct = p.avg_score;
    return `
      <tr onclick="openStudent(${p.id})">
        <td class="rank-cell ${rankClass}">${p.rank}</td>
        <td class="name-cell">
          ${p.first_name} ${p.last_name}
          <span>${p.cohort}</span>
        </td>
        <td class="score-cell">
          <div class="score-bar-wrap">
            <span style="color:${scoreColor(pct)}">${pct}</span>
            <div class="score-bar">
              <div class="score-bar-fill" style="width:${pct}%; background:${scoreColor(pct)}"></div>
            </div>
          </div>
        </td>
        <td><span class="badge-count">${p.review_count}</span></td>
        <td><span class="badge-count">${p.submission_count}</span></td>
      </tr>
    `;
  }).join('');
}

// ── Open student modal ─────────────────────────────────────
async function openStudent(id) {
  document.getElementById('modalBackdrop').classList.add('open');
  document.getElementById('modalName').textContent = '...';
  document.getElementById('modalSub').textContent  = '';
  document.getElementById('modalBody').innerHTML   = '<div class="loader">Yüklənir</div>';

  const d = await fetchJSON(`${API}/student/${id}`);
  const s = d.student;

  document.getElementById('modalName').textContent = `${s.first_name} ${s.last_name}`;
  document.getElementById('modalSub').textContent  = `ID: ${s.id} · ${s.cohort}`;

  const avgScore = d.project_scores.length
    ? (d.project_scores.reduce((a,b) => a + b.avg_score, 0) / d.project_scores.length).toFixed(1)
    : '—';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-stat-row">
      <div class="modal-stat">
        <div class="modal-stat-val" style="color:${scoreColor(avgScore)}">${avgScore}</div>
        <div class="modal-stat-lbl">Ortalama bal</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${d.project_scores.length}</div>
        <div class="modal-stat-lbl">Proyekt</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${d.given_reviews.length}</div>
        <div class="modal-stat-lbl">Verdiyi review</div>
      </div>
    </div>

    <div class="modal-section-title">📁 Proyekt üzrə ballar</div>
    ${d.project_scores.map(p => `
      <div class="project-row">
        <span class="project-name">${p.project_name}</span>
        <span class="project-score-val" style="color:${scoreColor(p.avg_score)}">${p.avg_score} / 100</span>
      </div>
    `).join('')}

    ${d.given_reviews.length ? `
      <div class="modal-section-title">💬 Verdiyi son review-lar</div>
      ${d.given_reviews.map(r => `
        <div class="project-row">
          <div>
            <div style="font-size:12px">${r.to_student}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px">${r.project_name}</div>
          </div>
          <span class="project-score-val" style="color:${scoreColor(r.score)}">${r.score}</span>
        </div>
      `).join('')}
    ` : ''}
  `;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop'))
    document.getElementById('modalBackdrop').classList.remove('open');
}
function closeModalDirect() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

// ── Init ───────────────────────────────────────────────────
loadStats();
loadLeaderboard();
</script>
</body>
</html>
